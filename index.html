<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ANALI" />
    <title>ANALI — Aprende inglés táctico</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D9488" />
    <link rel="apple-touch-icon" href="/anali_neutral.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Build Hash: 20240422_v4 -->
    <div id="root">
      <div id="boot-loader" style="height: 100vh; background: #F8FAFC; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; color: #0D9488;">
        <div style="font-size: 28px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 24px; letter-spacing: -1px;">Analí</div>
        <div style="width: 44px; height: 44px; border: 4px solid rgba(13,148,136,0.1); border-top-color: #0D9488; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
        <div style="margin-top: 24px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; color: #64748B;">Sincronizando Cerebro...</div>
      </div>
    </div>
    <script>
      // Emergency Error Logger for mobile debugging
      window.onerror = function(msg, url, line, col, error) {
        var str = msg + "\nAt: " + url + ":" + line;
        console.error(str);
        // If it's a mobile device and stays white for too long, we might show an alert
        // But for now just log it.
        return false;
      };

      // Force unregister persistent SW
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for(let r of regs) {
            console.log("Unregistering SW:", r);
            r.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
